name: Run Pytest

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@main
    
    - name: Set up Python
      uses: actions/setup-python@main
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv venv
        source .venv/bin/activate
        uv pip install -r requirements.txt
    
    - name: Run pytest
      run: |
        source .venv/bin/activate
        pytest -m single
