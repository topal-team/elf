name: Ruff Linter

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
    - name: Run Ruff formatter
      run: ruff format .
    - name: Run Ruff linter
      run: ruff check --fix .
    - name: Check for unfixable issues
      run: ruff check . --exit-non-zero-on-fix
    - name: Commit changes
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "Apply automatic formatting and linting fixes"
        file_pattern: "*.py"