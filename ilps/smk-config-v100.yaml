RESULTS_DIR: "../results/ilps"
RUNS_DIR: "runs"
LOG_DIR: "../logs"

SLURM:
  # Common sbatch options for GPU jobs; override per-cluster as needed
  account: "hyb@v100"
  constraint: "v100-32g"
  gpus_per_node: 4
  # Template for GPU flag. On some clusters use '--gpus-per-node={ngpus}'
  gpus_flag: "--gpus={ngpus}"
  # Optional: commands to prepare the environment on the node
  setup: "export OMP_NUM_THREADS=4"
  venv_activate: "source ~/work/venv/bin/activate"
